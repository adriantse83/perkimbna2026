<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Identifikasi Perumahan Kota Banda Aceh</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{

    width:100%;
    height:100%;
    overflow:hidden;
    background:#ffffff;

    font-family:Arial, Helvetica, sans-serif;

}

#container{

    position:relative;

    width:100vw;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

}

/* Cover */

#container img{

    max-width:100%;
    max-height:100%;

    width:auto;
    height:auto;

    display:block;

    user-select:none;
    -webkit-user-select:none;
    -moz-user-select:none;

    pointer-events:none;

}

/* Tombol */

#kliknext{

    position:absolute;

    right:4%;
    bottom:4%;

    z-index:1000;

}

#kliknext a{

    display:inline-block;

    background:#0066CC;

    color:#FFFFFF;

    text-decoration:none;

    font-weight:bold;

    font-size:clamp(15px,2vw,30px);

    padding:12px 24px;

    border:2px solid #FFFFFF;

    border-radius:8px;

    transition:.25s;

}

#kliknext a:hover{

    background:#004999;

}

/* Smartphone */

@media (max-width:768px){

#kliknext{

    right:15px;
    bottom:15px;

}

#kliknext a{

    font-size:16px;

    padding:10px 18px;

}

}

</style>

</head>

<body>

<div id="container">

<img
src="images/Slide_Cover.png"
alt="Cover" />

<div id="kliknext">

<a href="produksi_peta.html">

KLIK NEXT

</a>

</div>

</div>

</body>

</html>
