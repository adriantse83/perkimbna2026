<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Identifikasi Perumahan Kota Banda Aceh</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#ffffff;
    font-family:Arial,Helvetica,sans-serif;
}

#container{

    width:100vw;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

}

/* Pembungkus gambar */

#cover{

    position:relative;
    display:inline-block;

}

/* Gambar */

#cover img{

    display:block;

    max-width:100vw;
    max-height:100vh;

    width:auto;
    height:auto;

    user-select:none;
    -webkit-user-select:none;

    pointer-events:none;

}

/* Tombol */

#kliknext{

    position:absolute;

    right:3%;
    bottom:3%;

    z-index:999;

}

#kliknext a{

    display:inline-block;

    background:#0066CC;
    color:#FFFFFF;

    text-decoration:none;

    font-weight:bold;

    font-size:clamp(15px,2vw,30px);

    padding:12px 24px;

    border:2px solid #FFFFFF;
    border-radius:8px;

    transition:.25s;

    box-shadow:0 4px 10px rgba(0,0,0,.35);

}

#kliknext a:hover{

    background:#004999;

}

/* Smartphone */

@media (max-width:768px){

    #kliknext{

        left:50%;
        right:auto;

        bottom:4%;

        transform:translateX(-50%);

    }

    #kliknext a{

        font-size:15px;

        padding:10px 20px;

        white-space:nowrap;

    }

}

</style>

</head>

<body>

<div id="container">

    <div id="cover">

        <img src="images/Slide_Cover.png" alt="Cover">

        <div id="kliknext">

            <a href="produksi_peta.html">
                KLIK NEXT
            </a>

        </div>

    </div>

</div>

</body>
</html>
